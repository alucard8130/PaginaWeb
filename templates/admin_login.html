<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Admin — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0c10; color: #e8e6e1;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .box {
      width: 100%; max-width: 400px;
      padding: 48px 44px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0d1117;
    }
    .logo-mark {
      width: 32px; height: 32px; background: #c8ff00;
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 0 100%);
      margin-bottom: 28px;
    }
    .logo-mark span { font-size: 13px; font-weight: 800; color: #0a0c10; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .sub { font-family: 'DM Mono', monospace; font-size: 11px; color: #6b7280; letter-spacing: 0.12em; margin-bottom: 36px; }
    label { font-family: 'DM Mono', monospace; font-size: 10px; color: #6b7280; letter-spacing: 0.14em; text-transform: uppercase; display: block; margin-bottom: 8px; }
    input[type=password] {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e8e6e1; font-family: 'Syne', sans-serif;
      font-size: 15px; padding: 13px 16px;
      outline: none; margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input[type=password]:focus { border-color: rgba(200,255,0,0.4); }
    button {
      width: 100%; background: #c8ff00; color: #0a0c10;
      border: none; cursor: pointer;
      font-family: 'DM Mono', monospace; font-size: 12px;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 15px;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
      transition: background 0.2s;
    }
    button:hover { background: #d4ff26; }
    .error {
      background: rgba(226,75,74,0.1); border-left: 3px solid #e24b4a;
      color: #f09595; font-family: 'DM Mono', monospace;
      font-size: 12px; padding: 12px 16px; margin-bottom: 20px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo-mark"><span>SH</span></div>
    <h1>Panel de administración</h1>
    <div class="sub">GESAC — Acceso restringido</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" autofocus />
      <button type="submit">Ingresar →</button>
    </form>
  </div>
</body>
</html>
